<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Deep-Dive | Volume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --card-bg: rgba(23, 28, 36, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --glass: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

        header {
            background: #0a0e14 !important;
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            align-items: center;
        }

        .header-left { justify-self: start; display: flex; align-items: center; gap: 0.8rem; }
        .home-link { 
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 8px; 
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; transition: 0.3s;
            font-size: 1.1rem;
        }
        .home-link:hover { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.05); }

        .logo { font-size: 0.95rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .nav-links { justify-self: center; display: flex; gap: 0.3rem; }
        .nav-links a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.82rem; 
            transition: 0.3s; 
            padding: 0.4rem 0.8rem; 
            border-radius: 8px; 
            display: inline-block;
        }
        .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-links a.active { color: var(--accent); }

        .back-btn { 
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 50%; 
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--border); transform: translateX(-3px); }

        .container { width: 94%; max-width: 1400px; margin: 1.5rem auto; }

        .hero { margin-bottom: 2rem; }
        .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .hero p { color: var(--text-dim); font-size: 1rem; }

        .stats-strip { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 200px; padding: 1.2rem; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
        .stat-val { font-size: 1.6rem; font-weight: 700; }

        .search-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem; }
        .search-bar { background: #1e293b; color: white; border: 1px solid var(--border); padding: 10px 18px; border-radius: 10px; width: 100%; max-width: 350px; outline: none; transition: 0.3s; font-size: 0.9rem; }
        .search-bar:focus { border-color: var(--accent); }

        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: rgba(255,255,255,0.03); padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .company-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .company-link:hover { text-decoration: underline; }

        .up { color: var(--success); }
        .down { color: var(--error); }
        .badge { padding: 3px 8px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; border: 1px solid transparent; display: inline-block; }
        .b-pos { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: var(--success); }
        .b-neg { background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: var(--error); }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.6rem; }
            .stat-val { font-size: 1.4rem; }
            .stat-item { min-width: 100%; }
            .search-bar { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="analytics.html" class="home-link" title="Back to Analytics">←</a>
            <div class="logo">Ashika <span>Focus</span></div>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="volume_dashboard.html">Quadrants</a>
            <a href="analytics.html">Analytics</a>
            <a href="results_dashboard.html">Results</a>
            <a href="results_dashboard.html#board">Board</a>
        </nav>
        <div class="header-right">
            <span>Sector Deep-Dive</span>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1 id="sector-title">BSE 2000 Industry</h1>
            <p id="sector-desc">Detailed institutional flow within this dedicated subgroup.</p>
        </div>

        <div class="stats-strip">
            <div class="stat-item">
                <div class="stat-label">Daily Intensity</div>
                <div id="stat-daily" class="stat-val">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Sustainable (5D)</div>
                <div id="stat-sust" class="stat-val">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Stocks Count</div>
                <div id="stat-count" class="stat-val">--</div>
            </div>
        </div>

        <div class="search-row">
            <h2 style="font-size: 1.1rem; font-weight: 600;">Constituent Analytics</h2>
            <input type="text" id="sec-search" class="search-bar" placeholder="Search symbol..." oninput="refreshTable()">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('SYMBOL')">Symbol</th>
                        <th onclick="setSort('CLOSE')">Price</th>
                        <th onclick="setSort('RETURN_PCT')">Return %</th>
                        <th>Result Date</th>
                        <th onclick="setSort('VOL_Z')">Intensity</th>
                        <th onclick="setSort('VOL_Z_5D')">Sustainable</th>
                        <th>Deliv %</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA = __DATA__;
        const params = new URLSearchParams(window.location.search);
        const sectorName = params.get('s');
        let currentSort = 'VOL_Z';
        let sortDir = 'desc';

        function init() {
            if (!DATA || !sectorName || !DATA.sectors[sectorName]) return;
            document.getElementById('sector-title').textContent = sectorName;
            const stats = DATA.sectors[sectorName];
            document.getElementById('stat-daily').textContent = (stats.avg_vol_z > 0 ? '+' : '') + stats.avg_vol_z.toFixed(2);
            document.getElementById('stat-sust').textContent = (stats.avg_vol_z_5d > 0 ? '+' : '') + stats.avg_vol_z_5d.toFixed(2);
            document.getElementById('stat-count').textContent = stats.count;
            
            refreshTable();
        }

        function setSort(col) {
            if (currentSort === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
            else { currentSort = col; sortDir = 'desc'; }
            refreshTable();
        }

        function refreshTable() {
            const search = document.getElementById('sec-search').value.toUpperCase();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            
            let records = DATA.records.filter(r => r.SECTOR === sectorName);
            if (search) records = records.filter(r => r.SYMBOL.includes(search));
            
            records.sort((a,b) => (sortDir === 'desc' ? (b[currentSort]||0) - (a[currentSort]||0) : (a[currentSort]||0) - (b[currentSort]||0)));

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="https://www.screener.in/company/${r.SYMBOL}/" target="_blank" class="company-link">${r.SYMBOL}</a></td>
                    <td style="font-weight: 700;">₹${r.CLOSE.toFixed(1)}</td>
                    <td><span class="badge ${r.RETURN_PCT >=0 ? 'b-pos' : 'b-neg'}">${r.RETURN_PCT > 0 ? '+' : ''}${r.RETURN_PCT.toFixed(1)}%</span></td>
                    <td>
                        ${r.NEXT_MEETING ? `<div class="badge" style="background:rgba(245,158,11,0.15); color:#fbbf24; border:1px solid rgba(245,158,11,0.3); font-size:0.65rem;">🗓️ ${r.NEXT_MEETING}</div>` : 
                          (r.LAST_RESULT ? `<div class="badge" style="background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); font-size:0.65rem;">✅ ${r.LAST_RESULT}</div>` : '<span style="color:var(--text-dim); opacity:0.5;">—</span>')}
                    </td>
                    <td class="${r.VOL_Z > 1.5 ? 'up' : ''}">${r.VOL_Z.toFixed(2)}σ</td>
                    <td>${r.VOL_Z_5D.toFixed(2)}σ</td>
                    <td>${r.DELIV_PER.toFixed(1)}%</td>
                `;
                body.appendChild(tr);
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
