<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Analyzer | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --card-bg: rgba(23, 28, 36, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-purple: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --glass: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header {
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 1rem; }
        .back-btn { 
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 50%; 
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--border); transform: translateX(-3px); }

        .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: 0.3s; padding: 0.4rem 0.7rem; border-radius: 8px; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--card-bg); }

        .container { width: 94%; max-width: 1400px; margin: 1.5rem auto; animation: fadeIn 0.6s ease-out; }
        .header-meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1.2rem; }

        .quad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .q-card { 
            background: var(--card-bg); backdrop-filter: var(--glass); border: 1px solid var(--border); 
            border-radius: 16px; padding: 1.2rem; transition: 0.3s; cursor: pointer; position: relative;
            overflow: hidden;
        }
        .q-card:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .q-card.active { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        
        .q-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 0.6rem; }
        .q-card .count { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 0.4rem; }
        .q-card .desc { font-size: 0.75rem; color: var(--text-dim); }

        .q-1 { border-left: 4px solid var(--success); } .q-1 .count { color: var(--success); }
        .q-2 { border-left: 4px solid var(--error); } .q-2 .count { color: var(--error); }
        .q-3 { border-left: 4px solid var(--cyan); } .q-3 .count { color: var(--cyan); }
        .q-4 { border-left: 4px solid var(--amber); } .q-4 .count { color: var(--amber); }

        .controls { 
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; 
            margin-bottom: 1.5rem; background: var(--card-bg); padding: 1rem; 
            border-radius: 12px; border: 1px solid var(--border); 
        }
        .ctrl-group { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
        .ctrl-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }

        select, input { 
            width: 100%; background: #1e293b; color: white; border: 1px solid var(--border); 
            padding: 10px 12px; border-radius: 8px; font-size: 0.85rem; 
            outline: none; transition: 0.3s; 
        }
        select:focus, input:focus { border-color: var(--accent); }

        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(255,255,255,0.03); padding: 1rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 0.9rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .company-name { font-weight: 600; color: var(--accent); text-decoration: none; }
        .company-name:hover { text-decoration: underline; }
        .sector-name { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }

        .badge { padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .b-pos { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .b-neg { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
        .b-spike { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid #8b5cf6; }

        @media (max-width: 600px) {
            header { padding: 0.8rem 4%; }
            .nav-links { gap: 0.3rem; }
            .nav-links a { font-size: 0.8rem; padding: 0.3rem 0.5rem; }
            .quad-grid { grid-template-columns: 1fr; }
            .ctrl-group { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="analytics.html" class="back-btn">←</a>
            <div class="logo">Optimizer</div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="active">Dash</a>
            <a href="analytics.html">Smart</a>
        </nav>
    </header>

    <div class="container">
        <div class="header-meta">
            <span id="tradeDate">Loading...</span> | 
            Updated: <span id="updatedAt">...</span>
        </div>

        <div class="quad-grid">
            <div class="q-card q-1" id="card-Q1" onclick="setFilter('Q1')">
                <h3>Conviction Buy</h3>
                <div class="count" id="count-Q1">0</div>
                <div class="desc">Price + Delivery Spike</div>
            </div>
            <div class="q-card q-2" id="card-Q2" onclick="setFilter('Q2')">
                <h3>Distribution</h3>
                <div class="count" id="count-Q2">0</div>
                <div class="desc">Negative + Delivery Spike</div>
            </div>
            <div class="q-card q-3" id="card-Q3" onclick="setFilter('Q3')">
                <h3>Low-Conv Rally</h3>
                <div class="count" id="count-Q3">0</div>
                <div class="desc">Price Up + Low Vol</div>
            </div>
            <div class="q-card q-4" id="card-Q4" onclick="setFilter('Q4')">
                <h3>Weak Selling</h3>
                <div class="count" id="count-Q4">0</div>
                <div class="desc">Price Down + Low Vol</div>
            </div>
        </div>

        <div class="controls">
            <div class="ctrl-group">
                <input type="text" id="searchInput" placeholder="Search symbol or industry..." oninput="refresh()">
            </div>
            <div class="ctrl-group">
                <select id="quadrantFilter" onchange="refresh()">
                    <option value="ALL">All Quadrants</option>
                    <option value="Q1">Q1: Conviction Buy</option>
                    <option value="Q2">Q2: Distribution</option>
                    <option value="Q3">Q3: Low-Conv Rally</option>
                    <option value="Q4">Q4: Weak Selling</option>
                </select>
            </div>
            <div class="ctrl-group">
                <select id="spikeFilter" onchange="refresh()">
                    <option value="ALL">All Loads</option>
                    <option value="SPIKE">Delivery Spike (>200% MA)</option>
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('SYMBOL')">Symbol</th>
                        <th onclick="setSort('CLOSE')">Price</th>
                        <th onclick="setSort('RETURN_PCT')">Chg%</th>
                        <th onclick="setSort('DELIV_VS_MA_PCT')">vs 20D MA</th>
                        <th onclick="setSort('DELIV_PER')">Deliv %</th>
                         <th onclick="setSort('MARKET_CAP_CR')">MCap</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <!-- Rows here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA = __DATA__;
        let currentSort = 'DELIV_Z';
        let currentOrder = 'desc';
        let activeQuadrant = 'ALL';

        function init() {
            if (!DATA || !DATA.records) return;
            document.getElementById('tradeDate').textContent = "Date: " + DATA.trade_date;
            document.getElementById('updatedAt').textContent = DATA.updated_at;
            document.getElementById('count-Q1').textContent = DATA.quadrants.Q1;
            document.getElementById('count-Q2').textContent = DATA.quadrants.Q2;
            document.getElementById('count-Q3').textContent = DATA.quadrants.Q3;
            document.getElementById('count-Q4').textContent = DATA.quadrants.Q4;
            refresh();
        }

        function setFilter(q) {
            activeQuadrant = (activeQuadrant === q) ? 'ALL' : q;
            document.getElementById('quadrantFilter').value = activeQuadrant;
            for(let i=1; i<=4; i++) {
                document.getElementById('card-Q'+i).classList.toggle('active', activeQuadrant === 'Q'+i);
            }
            refresh();
        }

        function setSort(col) {
            if (currentSort === col) currentOrder = currentOrder === 'desc' ? 'asc' : 'desc';
            else { currentSort = col; currentOrder = 'desc'; }
            refresh();
        }

        function refresh() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            const spikeOnly = document.getElementById('spikeFilter').value === 'SPIKE';
            const qFilt = document.getElementById('quadrantFilter').value;
            
            let filtered = DATA.records.filter(r => {
                if (search && !r.SYMBOL.includes(search) && !r.SECTOR.toUpperCase().includes(search)) return false;
                if (spikeOnly && r.DELIV_VS_MA_PCT < 200) return false;
                const isPos = r.RETURN_PCT > 0;
                const aboveMA = r.DELIV_QTY > r.DELIV_MA20;
                let q = isPos ? (aboveMA ? 'Q1' : 'Q3') : (aboveMA ? 'Q2' : 'Q4');
                if (qFilt !== 'ALL' && q !== qFilt) return false;
                return true;
            });
            
            filtered.sort((a, b) => {
                let va = a[currentSort], vb = b[currentSort];
                if (va === null) return 1; if (vb === null) return -1;
                return currentOrder === 'desc' ? vb - va : va - vb;
            });
            render(filtered);
        }

        function render(rows) {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            rows.forEach(r => {
                const tr = document.createElement('tr');
                const isPos = r.RETURN_PCT > 0;
                const isSpike = r.DELIV_VS_MA_PCT >= 200;
                
                tr.innerHTML = `
                    <td>
                        <a href="https://www.screener.in/company/${r.SYMBOL}/" target="_blank" class="company-name">${r.SYMBOL}</a>
                        <div class="sector-name">${r.SECTOR}</div>
                    </td>
                    <td style="font-weight:700">₹${r.CLOSE.toLocaleString()}</td>
                    <td><span class="badge ${isPos ? 'b-pos' : 'b-neg'}">${isPos ? '+' : ''}${r.RETURN_PCT.toFixed(1)}%</span></td>
                    <td><span class="badge ${r.DELIV_VS_MA_PCT > 0 ? 'b-pos' : 'b-neg'} ${isSpike ? 'b-spike' : ''}">${r.DELIV_VS_MA_PCT > 0 ? '+' : ''}${Math.round(r.DELIV_VS_MA_PCT)}%</span></td>
                    <td>${r.DELIV_PER.toFixed(1)}%</td>
                    <td style="color:var(--text-dim)">${r.MARKET_CAP_CR ? Math.round(r.MARKET_CAP_CR / 1000) + 'k' : '—'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
