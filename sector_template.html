<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Deep-Dive | Volume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --card-bg: rgba(23, 28, 36, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --glass: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

        header {
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .back-btn { 
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%; 
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--border); transform: translateX(-3px); }

        .container { width: 92%; max-width: 1400px; margin: 2.5rem auto; }

        .hero { margin-bottom: 3rem; }
        .hero h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .hero p { color: var(--text-dim); font-size: 1.1rem; }

        .search-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .search-bar { background: #1e293b; color: white; border: 1px solid var(--border); padding: 10px 18px; border-radius: 10px; width: 300px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); }

        .stats-strip { display: flex; gap: 2rem; margin-bottom: 2rem; padding: 1.5rem; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); }
        .stat-item { flex: 1; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
        .stat-val { font-size: 1.8rem; font-weight: 700; }

        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: rgba(255,255,255,0.03); padding: 1.2rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .company-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .company-link:hover { text-decoration: underline; }

        .up { color: var(--success); }
        .down { color: var(--error); }
        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; border: 1px solid transparent; }
        .b-pos { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: var(--success); }
        .b-neg { background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: var(--error); }
    </style>
</head>
<body>
    <header>
        <a href="analytics.html" class="back-btn">←</a>
        <div style="font-size: 1.3rem; font-weight: 700; color: var(--accent);">Industry Deep-Dive</div>
    </header>

    <div class="container">
        <div class="hero">
            <h1 id="sector-title">BSE 2000 Industry</h1>
            <p id="sector-desc">Detailed institutional flow within this specific subgroup.</p>
        </div>

        <div class="stats-strip">
            <div class="stat-item">
                <div class="stat-label">Daily Intensity</div>
                <div id="stat-daily" class="stat-val">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Sustainable Flow (5D)</div>
                <div id="stat-sust" class="stat-val">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Stocks</div>
                <div id="stat-count" class="stat-val">--</div>
            </div>
        </div>

        <div class="search-row">
            <h2 style="font-weight: 600;">Constituent Analytics</h2>
            <input type="text" id="sec-search" class="search-bar" placeholder="Filter industry stocks..." oninput="refreshTable()">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('SYMBOL')">Symbol</th>
                        <th onclick="setSort('CLOSE')">Price</th>
                        <th onclick="setSort('RETURN_PCT')">Return %</th>
                        <th onclick="setSort('VOL_Z')">Daily Z</th>
                        <th onclick="setSort('VOL_Z_5D')">Sustainable</th>
                        <th onclick="setSort('DELIV_PER')">Deliv %</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA = __DATA__;
        const params = new URLSearchParams(window.location.search);
        const sectorName = params.get('s');
        let currentSort = 'VOL_Z';
        let sortDir = 'desc';

        function init() {
            if (!DATA || !sectorName || !DATA.sectors[sectorName]) return;
            document.getElementById('sector-title').textContent = sectorName;
            const stats = DATA.sectors[sectorName];
            document.getElementById('stat-daily').textContent = (stats.avg_vol_z > 0 ? '+' : '') + stats.avg_vol_z.toFixed(2);
            document.getElementById('stat-sust').textContent = (stats.avg_vol_z_5d > 0 ? '+' : '') + stats.avg_vol_z_5d.toFixed(2);
            document.getElementById('stat-count').textContent = stats.count;
            
            refreshTable();
        }

        function setSort(col) {
            if (currentSort === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
            else { currentSort = col; sortDir = 'desc'; }
            refreshTable();
        }

        function refreshTable() {
            const search = document.getElementById('sec-search').value.toUpperCase();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            
            let records = DATA.records.filter(r => r.SECTOR === sectorName);
            if (search) records = records.filter(r => r.SYMBOL.includes(search));
            
            records.sort((a,b) => (sortDir === 'desc' ? (b[currentSort]||0) - (a[currentSort]||0) : (a[currentSort]||0) - (b[currentSort]||0)));

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="https://www.screener.in/company/${r.SYMBOL}/" target="_blank" class="company-link">${r.SYMBOL}</a></td>
                    <td style="font-weight: 700;">₹${r.CLOSE.toFixed(2)}</td>
                    <td><span class="badge ${r.RETURN_PCT >=0 ? 'b-pos' : 'b-neg'}">${r.RETURN_PCT > 0 ? '+' : ''}${r.RETURN_PCT.toFixed(2)}%</span></td>
                    <td class="${r.VOL_Z > 1.5 ? 'up' : ''}">${r.VOL_Z.toFixed(2)}σ</td>
                    <td class="${r.VOL_Z_5D > 1 ? 'up' : ''}">${r.VOL_Z_5D.toFixed(2)}σ</td>
                    <td>${r.DELIV_PER.toFixed(1)}%</td>
                `;
                body.appendChild(tr);
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
