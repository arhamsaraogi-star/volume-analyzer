name: Daily Volume Analyzer Update

on:
  schedule:
    - cron: '30 14 * * *' # 8:00 PM IST (2:30 PM UTC)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Volume Analyzer Pipeline
        env:
          SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: python daily_runner.py

      - name: Commit and Push Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Dashboard data for $(date +'%Y-%m-%d')"
          file_pattern: 'public_site/index.html screener_cache/*'
